<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BMAD para Equipos de Software: Fases + RACI</title>
  <desc id="desc">Imagen destacada: velocidad, eficiencia y calidad dentro del flujo.</desc>

  <rect width="1200" height="630" fill="#fefefe" />

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <text x="600" y="130" font-size="16" font-weight="600" fill="#b91c1c" letter-spacing="6" text-anchor="middle">B M A D &#8201;&#183;&#8201; P A R A &#8201; E Q U I P O S</text>

    <text x="600" y="298" font-size="92" font-weight="800" fill="#1a1a1a" letter-spacing="-2" text-anchor="middle">Velocidad. Eficiencia.</text>
    <text x="600" y="400" font-size="92" font-weight="800" fill="#b91c1c" letter-spacing="-2" text-anchor="middle">Calidad dentro.</text>

    <line x1="556" y1="464" x2="644" y2="464" stroke="#b91c1c" stroke-width="3" />

    <text x="600" y="528" font-size="22" fill="#525252" text-anchor="middle">Trazabilidad, diseño de pruebas y gates dentro del flujo</text>
    <text x="600" y="560" font-size="22" fill="#525252" text-anchor="middle">&#8212; no se añaden al final.</text>
  </g>
</svg>
