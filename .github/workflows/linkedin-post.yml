name: Post to LinkedIn

# Runs every Tuesday at 09:00 CET (= 08:00 UTC).
# Can also be triggered manually via workflow_dispatch to post the latest article immediately.
on:
  schedule:
    - cron: '0 8 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-to-linkedin:
    runs-on: ubuntu-latest
    name: Post latest article to LinkedIn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Post latest article to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: "disabled"
          WEBSITE_URL: https://lorenzogm.com
        run: |
          echo "LinkedIn posting is currently disabled"
          # node .github/scripts/post-to-linkedin.js
