name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    name: PR Checks
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run code quality checks
        run: pnpm check

      - name: Install Playwright Browsers
        run: pnpm --filter lorenzogm-web exec playwright install --with-deps chromium

      - name: Run E2E Tests (including visual regression)
        run: pnpm --filter lorenzogm-web run test:e2e

      - name: Upload visual test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: |
            apps/lorenzogm/test-results/
            apps/lorenzogm/playwright-report/
          retention-days: 7
