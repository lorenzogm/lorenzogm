name: Github Infrastructure Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infra/github/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-changes:
    runs-on: ubuntu-latest
    name: Check for infra changes
    outputs:
      github-infra-changed: ${{ steps.check.outputs.github-infra-changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in GitHub infra
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "github-infra-changed=true" >> $GITHUB_OUTPUT
            echo "Manual trigger — deploying GitHub infrastructure"
            exit 0
          fi

          if git diff --name-only HEAD~1 -- infra/github/src/ | grep -q .; then
            echo "github-infra-changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in GitHub repo infrastructure"
          else
            echo "github-infra-changed=false" >> $GITHUB_OUTPUT
            echo "No changes in GitHub repo infrastructure"
          fi

  github-infra-deploy:
    needs: check-changes
    if: needs.check-changes.outputs.github-infra-changed == 'true'
    runs-on: ubuntu-latest
    name: GitHub Infra Deploy
    env:
      TF_VAR_ENVIRONMENT: production
      TF_VAR_GITHUB_OWNER: ${{ github.repository_owner }}
      TF_VAR_GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Validate required token
        run: |
          if [ -z "$TF_VAR_GITHUB_TOKEN" ]; then
            echo "::error::GH_PAT_TOKEN secret is not set in GitHub Actions"
            exit 1
          fi
          echo "✓ GH_PAT_TOKEN secret available"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra/github/src
        run: |
          terraform init

      - name: Bootstrap Terraform state from existing GitHub resources
        working-directory: infra/github/src
        run: |
          REPO_NAME=$(jq -r '.repository.name' config.json)
          if [ -z "$REPO_NAME" ] || [ "$REPO_NAME" = "null" ]; then
            echo "::error::Could not resolve repository.name from config.json"
            exit 1
          fi

          echo "Importing existing repository: $REPO_NAME"
          terraform import -var-file='config.json' github_repository.main "$REPO_NAME" || true

          echo "Importing existing branch protections"
          terraform import -var-file='config.json' 'github_branch_protection.main["main"]' "$REPO_NAME:main" || true
          terraform import -var-file='config.json' 'github_branch_protection.main["terraform-state"]' "$REPO_NAME:terraform-state" || true

          echo "Importing existing labels from config.json"
          jq -r '.labels[].name' config.json | while read -r label; do
            [ -z "$label" ] && continue
            terraform import -var-file='config.json' "github_issue_label.labels[\"$label\"]" "$REPO_NAME:$label" || true
          done

      - name: Terraform Plan
        working-directory: infra/github/src
        id: plan
        run: |
          terraform plan -var-file='config.json' -out=tfplan

      - name: Terraform Apply
        working-directory: infra/github/src
        run: |
          terraform apply -auto-approve tfplan

      - name: Export Results
        id: deployment-results
        working-directory: infra/github/src
        run: |
          REPO_ID=$(terraform output -raw GITHUB_REPOSITORY_ID)
          REPO_URL=$(terraform output -raw GITHUB_REPOSITORY_URL)
          echo "repository-id=$REPO_ID" >> $GITHUB_OUTPUT
          echo "repository-url=$REPO_URL" >> $GITHUB_OUTPUT
          echo "✓ Repository ID: $REPO_ID"
          echo "✓ Repository URL: $REPO_URL"

      - name: Post Deployment Summary
        run: |
          echo "### ✅ GitHub Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ steps.deployment-results.outputs.repository-url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration Applied:**" >> $GITHUB_STEP_SUMMARY
          echo "- Branch protection rules" >> $GITHUB_STEP_SUMMARY
          echo "- Repository settings" >> $GITHUB_STEP_SUMMARY
          echo "- Issue labels" >> $GITHUB_STEP_SUMMARY
          echo "- Security and analysis features" >> $GITHUB_STEP_SUMMARY
